<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple HTML Example with Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        p {
            color: #666;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto 20px auto;
            text-align: center;
        }
        /* 图片容器，用于并排显示 */
        .image-container {
            display: flex;
            justify-content: center; /* 居中对齐 */
            gap: 20px; /* 两张图片之间的间距 */
            flex-wrap: wrap; /* 在小屏幕上自动换行 */
            margin-top: 30px;
        }
        /* 单个图片的样式 */
        .image-box {
            background-color: white;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center; /* 说明文字居中 */
            max-width: 40%; /* 限制宽度，防止过大 */
        }
        .image-box img {
            max-width: 100%; /* 图片宽度适应容器 */
            height: auto; /* 保持比例 */
            border-radius: 4px;
        }
        .image-caption {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Simple Page</h1>

    <p>This is a basic example of an HTML page. Below, you can see two images displayed side-by-side with captions. We have used CSS to give them a nice border and shadow effect.</p>

    <div class="image-container">

        <div class="image-box">
            <img src="https://via.placeholder.com/400x300?text=Image+One" alt="A placeholder image for the first example">
            <div class="image-caption">Image 1: A scenic placeholder view.</div>
        </div>

        <div class="image-box">
            <img src="https://via.placeholder.com/400x300?text=Image+Two" alt="A placeholder image for the second example">
            <div class="image-caption">Image 2: Another beautiful placeholder.</div>
        </div>

    </div>

</body>
</html>
